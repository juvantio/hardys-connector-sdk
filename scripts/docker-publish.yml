# =============================================================================
# docker-publish.yml
# GitHub Actions workflow — build and push connector image to ghcr.io
#
# USAGE:
#   Copy this file to .github/workflows/docker-publish.yml in your connector repo.
#   No secrets required — uses GITHUB_TOKEN.
#
# TRIGGERS:
#   - Push to main branch         -> image tagged :main-{sha}
#   - Version tag (v1.2.3)        -> image tagged :1.2.3, :1.2, :1, :latest
#
# OCI ANNOTATION:
#   The workflow automatically bakes connector-manifest.json into the image
#   as an OCI label so Hardys Core can read it via docker inspect.
#   Requires connector-manifest.json at the repo root.
#
# IMAGE NAMING:
#   ghcr.io/{org}/{repo}:{tag}
#   e.g. ghcr.io/juvantio/hardys-connector-lecture-teams:1.2.0
# =============================================================================

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read connector-manifest.json
        id: manifest
        run: |
          if [ ! -f connector-manifest.json ]; then
            echo "ERROR: connector-manifest.json not found at repo root."
            echo "Every Hardys connector must include this file."
            exit 1
          fi
          python3 -c "import json,sys; json.load(open('connector-manifest.json'))" || {
            echo "ERROR: connector-manifest.json is not valid JSON."
            exit 1
          }
          MANIFEST_PATH="/app/connector-manifest.json"
          echo "manifest_path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"
          echo "Manifest found and valid. Will be embedded at: $MANIFEST_PATH"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,enable=${{ github.ref_type == 'branch' }}
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.vendor=Juvant Srls
            org.hardys.connector.manifest-path=${{ steps.manifest.outputs.manifest_path }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify OCI annotation
        run: |
          FIRST_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker pull "$FIRST_TAG"
          LABEL=$(docker inspect "$FIRST_TAG" \
            --format '{{index .Config.Labels "org.hardys.connector.manifest-path"}}')
          if [ -z "$LABEL" ]; then
            echo "ERROR: OCI annotation 'org.hardys.connector.manifest-path' not found on built image."
            exit 1
          fi
          echo "OCI annotation verified: $LABEL"
