syntax = "proto3";
package hardys.connector.lecture.v2;

// =============================================================================
// Hardys Connector Framework — Lecture Class ConnectorService
// Version: lecture.v2
// =============================================================================
//
// This file defines the lecture-class specific gRPC contract.
// Every lecture connector MUST also implement BaseConnectorService
// from protos/base/base.proto.
//
// Architecture: fully event-driven. No callback servers.
// - Connector → Core signals: typed events on StreamEvents
// - Core → Connector commands: SendControl
//
// Reference: LMS Architecture v0.6 + HCF v1.2 (Apr 2026)

// -----------------------------------------------------------------------------
// Capabilities (lecture-class specific)
// -----------------------------------------------------------------------------

// Declared in HealthCheckResponse.caps as repeated strings.
// Known capability strings for the lecture class:
//   "audio"              — StreamAudio supported
//   "audio_video"        — StreamAudioVideo supported
//   "chat_read"          — StreamChat supported
//   "chat_write"         — SendChat supported
//   "native_diarization" — platform provides speaker_id natively
//   "native_transcript"  — platform provides transcript natively (Teams, Zoom)

// -----------------------------------------------------------------------------
// Lecture reference, connection, and instructor
// -----------------------------------------------------------------------------

message LectureConfig {
  bool audio_enabled      = 1;  // default: true
  bool video_enabled      = 2;  // default: false
  bool chat_read_enabled  = 3;  // default: true
  bool chat_write_enabled = 4;  // default: true
}

message LectureRef {
  string lecture_id   = 1;  // platform lecture/session ID
  string lecture_name = 2;  // human-readable name
  string join_url     = 3;  // optional: guest link or enrollment URL
}

message LectureDetails {
  string lecture_id            = 1;
  string lecture_name          = 2;
  uint64 start_time_ms         = 3;  // epoch ms
  uint64 end_time_ms           = 4;  // epoch ms — 0 if open-ended
  uint32 expected_participants = 5;
  string platform              = 6;  // e.g. "collaborate", "teams"
}

// Instructor identity — passed by Core so the connector can identify
// the instructor in the platform roster and populate is_instructor in AudioFrame.
// The connector does NOT determine who the instructor is independently.
message InstructorInfo {
  string instructor_id = 1;  // platform user ID, if known
  string full_name     = 2;  // for display name matching
  string email         = 3;  // optional, alternative matching
}

message ConnectRequest {
  LectureRef     lecture    = 1;
  LectureConfig  config     = 2;
  InstructorInfo instructor = 3;  // Core tells connector who the instructor is
}

message ConnectResponse {
  bool           connected = 1;
  string         error     = 2;
  LectureDetails details   = 3;  // populated on success
}

// -----------------------------------------------------------------------------
// Speaker identity
// -----------------------------------------------------------------------------

enum AudioSource {
  AUDIO_SOURCE_UNKNOWN = 0;
  AUDIO_SOURCE_MIX     = 1;  // all speakers mixed (e.g. Collaborate/Chime SFU)
  AUDIO_SOURCE_SPEAKER = 2;  // per-speaker stream (e.g. Teams, Google Meet)
}

enum SpeakerRole {
  SPEAKER_ROLE_UNKNOWN     = 0;
  SPEAKER_ROLE_PRESENTER   = 1;  // has session control — typically the instructor
  SPEAKER_ROLE_PARTICIPANT = 2;  // student or guest
}

// -----------------------------------------------------------------------------
// Inbound stream messages
// -----------------------------------------------------------------------------

// Raw PCM audio — connectors NEVER transcribe. All AI inference in Hardys Core.
// is_instructor is populated by matching the speaker against InstructorInfo
// from ConnectRequest. This is format normalization, not inference.
message AudioFrame {
  bytes       data          = 1;  // PCM 16-bit 16kHz mono
  uint64      timestamp     = 2;  // epoch ms
  string      speaker_id   = 3;  // optional: native platform diarization
  string      speaker_name = 4;  // optional: display name from platform
  float       confidence   = 5;  // optional: diarization confidence 0.0–1.0
  bool        is_speaking  = 6;  // optional: voice activity flag
  AudioSource source       = 7;
  SpeakerRole speaker_role = 8;  // PRESENTER or PARTICIPANT
  bool        is_instructor = 9; // true if speaker matches InstructorInfo
}

// Raw video frames — connectors NEVER analyze. All AI inference in Hardys Core.
message VideoFrame {
  bytes  data       = 1;  // raw frame bytes
  uint64 timestamp  = 2;  // epoch ms
  string format     = 3;  // "h264", "vp8", "vp9"
  string speaker_id = 4;  // optional: which participant
}

// Combined audio+video — for connectors supporting both.
// Use StreamAudioVideo (not StreamAudio + StreamVideo) for synchronized delivery.
message MediaFrame {
  AudioFrame audio     = 1;  // always populated
  VideoFrame video     = 2;  // always populated
  uint64     timestamp = 3;  // common timestamp for A/V sync
}

// Inbound chat — connector strips HTML. Hardys Core receives plain text.
message ChatMessage {
  string message_id  = 1;
  string sender_id   = 2;
  string sender_name = 3;
  string text        = 4;  // plain text
  uint64 timestamp   = 5;  // epoch ms
}

// -----------------------------------------------------------------------------
// LectureEvent stream — all 24 event types
// -----------------------------------------------------------------------------
//
// StreamEvents carries TWO categories of events:
//   1. Platform events (1–21): what happens in the lecture
//   2. Lifecycle control events (22–24): connector state signals to Core
//
// No callback servers needed — one stream, one paradigm.

// Platform events
message LectureStartedEvent          { LectureDetails details = 1; }
message LectureClosedEvent           { string reason = 1; }
message LecturePausedEvent           { uint64 timestamp = 1; }
message LectureResumedEvent          { uint64 timestamp = 1; }
message LectureRecordingStartedEvent { uint64 timestamp = 1; }
message LectureRecordingStoppedEvent { uint64 timestamp = 1; }

// SpeakerChangedEvent includes role and is_instructor so Core knows
// immediately when the instructor starts speaking — no frame-by-frame analysis.
message SpeakerChangedEvent {
  string      speaker_id    = 1;
  string      speaker_name  = 2;
  SpeakerRole speaker_role  = 3;
  bool        is_instructor = 4;
}

message ParticipantJoinedEvent     { string participant_id = 1; string name = 2; SpeakerRole role = 3; }
message ParticipantLeftEvent       { string participant_id = 1; }
message ParticipantRaisedHandEvent { string participant_id = 1; string name = 2; }
message ParticipantMutedEvent      { string participant_id = 1; }
message ParticipantUnmutedEvent    { string participant_id = 1; }
message ScreenShareStartedEvent    { string participant_id = 1; }
message ScreenShareStoppedEvent    { string participant_id = 1; }
message PollStartedEvent           { string question = 1; repeated string options = 2; }
message PollClosedEvent            { string poll_id = 1; }
message BreakoutRoomStartedEvent   { uint32 room_count = 1; }
message BreakoutRoomClosedEvent    { uint64 timestamp = 1; }
message ChatMessageReceivedEvent   { ChatMessage message = 1; }

// Lifecycle control events — connector signals to Core via StreamEvents.
// No callback servers — one stream, one paradigm.

// Emitted as the FIRST instruction inside Connect().
// Core allocates resources and prepares the ingestion pipeline
// before the connector completes the platform join.
message LectureStartEvent {
  LectureRef     lecture = 1;
  LectureDetails details = 2;
}

// Emitted as the FIRST instruction inside Disconnect().
// Core deallocates resources and closes the ingestion pipeline
// before the connector leaves the platform.
message LectureCloseEvent {
  LectureRef lecture = 1;
  string     reason  = 2;
}

// Emitted when an error occurs during the lecture.
// Core may respond with SendControl(abort) if the error is non-recoverable.
message LectureErrorEvent {
  LectureError error = 1;
}

message LectureEvent {
  oneof event {
    // Platform events
    LectureStartedEvent          started              =  1;
    LectureClosedEvent           closed               =  2;
    LecturePausedEvent           paused               =  3;
    LectureResumedEvent          resumed              =  4;
    LectureRecordingStartedEvent recording_started    =  5;
    LectureRecordingStoppedEvent recording_stopped    =  6;
    SpeakerChangedEvent          speaker_changed      =  7;
    ParticipantJoinedEvent       participant_joined   =  8;
    ParticipantLeftEvent         participant_left     =  9;
    ParticipantRaisedHandEvent   hand_raised          = 10;
    ParticipantMutedEvent        participant_muted    = 11;
    ParticipantUnmutedEvent      participant_unmuted  = 12;
    ScreenShareStartedEvent      screen_share_started = 13;
    ScreenShareStoppedEvent      screen_share_stopped = 14;
    PollStartedEvent             poll_started         = 15;
    PollClosedEvent              poll_closed          = 16;
    BreakoutRoomStartedEvent     breakout_started     = 17;
    BreakoutRoomClosedEvent      breakout_closed      = 18;
    ChatMessageReceivedEvent     chat_received        = 19;
    // Lifecycle control events
    LectureStartEvent            lecture_start        = 20;  // first instruction in Connect()
    LectureCloseEvent            lecture_close        = 21;  // first instruction in Disconnect()
    LectureErrorEvent            lecture_error        = 22;
  }
  uint64 timestamp = 23;
}

// -----------------------------------------------------------------------------
// Outbound — Core → Platform
// -----------------------------------------------------------------------------

// SendChat: Core sends a message into session chat via the connector.
// Connector handles platform-specific formatting (HTML for jinx, Bot Activity for Teams).
message ChatOutMessage  { string text = 1; }
message ChatOutResponse { bool success = 1; string error = 2; }

// SendControl: Core sends commands to the connector.
// Typically used to respond to LectureErrorEvent on StreamEvents.
message AbortCommand  { string reason = 1; }  // non-recoverable — stop immediately
message PauseCommand  { string reason = 1; }  // temporary pause
message ResumeCommand { string reason = 1; }  // resume after pause

message ControlMessage {
  oneof command {
    AbortCommand  abort  = 1;
    PauseCommand  pause  = 2;
    ResumeCommand resume = 3;
  }
}
message ControlResponse { bool acknowledged = 1; string error = 2; }

// Testing
message TestStreamRequest {
  uint32 duration_seconds = 1;
  bool   mock             = 2;
}

// -----------------------------------------------------------------------------
// LectureError — full typed error taxonomy
// -----------------------------------------------------------------------------

enum LectureErrorType {
  ERROR_UNKNOWN                       =  0;
  // Stream
  ERROR_STREAM_INTERRUPTED            =  1;
  ERROR_AUDIO_QUALITY_DEGRADED        =  2;
  ERROR_VIDEO_QUALITY_DEGRADED        =  3;
  ERROR_STREAM_DESYNC                 =  4;
  // Participation
  ERROR_LECTURE_NOT_STARTED           =  5;  // retryable — retry_after_ms populated if known
  ERROR_LECTURE_ALREADY_ENDED         =  6;
  ERROR_KICKED_FROM_LECTURE           =  7;
  ERROR_LECTURE_CAPACITY_REACHED      =  8;
  ERROR_PERMISSION_DENIED             =  9;
  // Authentication
  ERROR_AUTH_EXPIRED                  = 10;  // retryable
  ERROR_AUTH_INVALID                  = 11;
  ERROR_AUTH_INSUFFICIENT_PERMISSIONS = 12;
  ERROR_TOKEN_EXPIRED_DURING_LECTURE  = 13;  // retryable if connector can renew
  ERROR_INVALID_SESSION               = 14;
  // Platform
  ERROR_PLATFORM_DISCONNECT           = 15;  // retryable
  ERROR_PLATFORM_UNAVAILABLE          = 16;  // retryable
  ERROR_PLATFORM_VERSION_INCOMPATIBLE = 17;  // fatal — requires connector update
  ERROR_RATE_LIMITED                  = 18;  // retryable — retry_after_ms populated
  // Network
  ERROR_NETWORK_TEMPORARY             = 19;  // retryable
  // Chat
  ERROR_CHAT_DISABLED                 = 20;
  ERROR_CHAT_MESSAGE_REJECTED         = 21;
  // Connector
  ERROR_CONNECTOR_OVERLOADED          = 22;  // retryable — Core may reroute
  ERROR_CONNECTOR_SHUTTING_DOWN       = 23;  // retryable — Core may reroute
  // Capability
  ERROR_CAPABILITY_UNAVAILABLE        = 24;
}

enum LectureErrorSeverity {
  SEVERITY_INFO    = 0;  // degradation, chat disabled — no urgent action
  SEVERITY_WARNING = 1;  // stream interrupted, rate limited — Core monitors
  SEVERITY_ERROR   = 2;  // auth expired, kicked — Core must intervene
  SEVERITY_FATAL   = 3;  // platform incompatible, invalid session — non-recoverable
}

// Typed context per error category — avoids stringly-typed error details.
message StreamErrorDetail {
  string stream_type = 1;  // "audio" | "video" | "chat"
  float  packet_loss = 2;
  uint32 jitter_ms   = 3;
  uint32 desync_ms   = 4;  // only for StreamAudioVideo
}
message AuthErrorDetail {
  string token_id    = 1;
  uint64 expired_at  = 2;  // epoch ms
}
message PlatformErrorDetail {
  string platform_code = 1;  // native platform error code
  string platform_msg  = 2;  // native platform error message
  string api_version   = 3;  // platform API version at time of error
}
message ParticipationErrorDetail {
  string lecture_id          = 1;
  uint64 scheduled_start_ms  = 2;  // for ERROR_LECTURE_NOT_STARTED
  uint64 ended_at_ms         = 3;  // for ERROR_LECTURE_ALREADY_ENDED
  string kicked_by           = 4;  // for ERROR_KICKED_FROM_LECTURE
  uint32 capacity            = 5;  // for ERROR_LECTURE_CAPACITY_REACHED
}
message ChatErrorDetail {
  string message_id       = 1;
  string rejection_reason = 2;
}
message ConnectorErrorDetail {
  uint32 active_lectures = 1;  // for ERROR_CONNECTOR_OVERLOADED
  uint64 shutdown_at_ms  = 2;  // for ERROR_CONNECTOR_SHUTTING_DOWN
}

message LectureErrorContext {
  oneof detail {
    StreamErrorDetail        stream        = 1;
    AuthErrorDetail          auth          = 2;
    PlatformErrorDetail      platform      = 3;
    ParticipationErrorDetail participation = 4;
    ChatErrorDetail          chat          = 5;
    ConnectorErrorDetail     connector     = 6;
  }
}

message LectureError {
  string               error_id       = 1;  // UUID for log correlation
  LectureErrorType     type           = 2;
  LectureErrorSeverity severity       = 3;
  string               method         = 4;  // which method generated the error
  bool                 retryable      = 5;
  uint32               retry_after_ms = 6;
  uint64               timestamp      = 7;  // epoch ms
  LectureErrorContext  context        = 8;
  string               stack_trace    = 9;  // optional — debug builds only
}

// -----------------------------------------------------------------------------
// ConnectorManagementService — optional
// -----------------------------------------------------------------------------
//
// Set management_supported=false in HealthCheck if not implementing.
//
// Faculty App UX:
//   management_supported=true  → lecture list, tap to activate
//   management_supported=false → text field for guest link / session token
//
// ActivateLectureRequest includes InstructorInfo so the connector can
// match the instructor immediately when the lecture starts.

message ListLecturesRequest {
  string course_id = 1;
  string date      = 2;  // ISO date YYYY-MM-DD — defaults to today
}

message LectureInfo {
  string lecture_id    = 1;
  string lecture_name  = 2;
  string start_time    = 3;  // ISO 8601
  string end_time      = 4;  // ISO 8601
  bool   is_active     = 5;
  bool   audio_enabled = 6;
}

message ListLecturesResponse  { repeated LectureInfo lectures = 1; }
message GetLectureRequest     { string lecture_id = 1; }

message ActivateLectureRequest {
  string         lecture_id  = 1;
  LectureConfig  config      = 2;
  InstructorInfo instructor  = 3;  // Core passes who the instructor is
}

message ActivateLectureResponse {
  bool            success = 1;
  string          error   = 2;
  ConnectResponse details = 3;  // populated on success
}

service ConnectorManagementService {
  rpc ListLectures    (ListLecturesRequest)    returns (ListLecturesResponse);
  rpc GetLecture      (GetLectureRequest)      returns (LectureInfo);
  rpc ActivateLecture (ActivateLectureRequest) returns (ActivateLectureResponse);
}

// -----------------------------------------------------------------------------
// ConnectorService — lecture class
// -----------------------------------------------------------------------------

service ConnectorService {
  // Lecture lifecycle
  rpc Connect     (ConnectRequest)  returns (ConnectResponse);

  // Inbound streams (Core opens, Connector streams)
  // Use StreamAudio for audio-only connectors (e.g. Collaborate).
  // Use StreamAudioVideo for connectors supporting both (e.g. Teams, Meet, Zoom).
  rpc StreamAudio      (ConnectRequest) returns (stream AudioFrame);
  rpc StreamAudioVideo (ConnectRequest) returns (stream MediaFrame);
  rpc StreamChat       (ConnectRequest) returns (stream ChatMessage);
  rpc StreamEvents     (ConnectRequest) returns (stream LectureEvent);

  // Outbound — Core → Platform
  rpc SendChat    (ChatOutMessage)  returns (ChatOutResponse);
  rpc SendControl (ControlMessage)  returns (ControlResponse);

  // Testing
  rpc TestStream  (TestStreamRequest) returns (stream AudioFrame);
}
